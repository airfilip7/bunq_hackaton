services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - SQLITE_PATH=/tmp/bunq_nest.db
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=ASIAVPMCBMT57ORGJGC3
      - AWS_SECRET_ACCESS_KEY=H9dcfTPN7n+KbFEpJhJ1sVFqES2HrE1+8G9c6QrR
      - AWS_SESSION_
    volumes:
      - ./backend:/app/backend

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - API_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/vite.config.ts:/app/vite.config.ts
