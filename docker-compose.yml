services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SQLITE_PATH=/tmp/bunq_nest.db
      - AWS_DEFAULT_REGION="us-east-1"
      - AWS_ACCESS_KEY_ID="ASIAVPMCBMT5ZZGKMRYA"
      - AWS_SECRET_ACCESS_KEY="1pelf2nvuTuh3eRkbR3gmTTTYsdeZSXX8bR4lj77"
      - AWS_SESSION_TOKEN=""
    volumes:
      - ./backend:/app/backend

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - API_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/vite.config.ts:/app/vite.config.ts
